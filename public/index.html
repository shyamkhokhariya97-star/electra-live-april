    <script>
        var activeModel;

        var scroller;
        var currentScrollY = 0;
        var windowWidth = 0;
        var windowHeight = 0;

        document.fonts.ready.then(function () {
            initPage();

            windowWidth = $(window).width();
            windowHeight = $(window).height();

            if ("scrollRestoration" in history) {
                history.scrollRestoration = "manual";
            }

            if ("ontouchstart" in document.documentElement) {
                $("html").addClass("touch");
            }

            $(window).on("resize", function () {
                if ($(window).width() > windowWidth) {
                    windowHeight = $(window).height();
                    windowWidth = $(window).width();
                }
            });

            //if window > 580px
            if ($(window).width() > 580) {
                $(window).on("scroll", function () {
                    if ($(".select2-container--open").length > 0) {
                        $(".select2-hidden-accessible").select2("close");
                    }
                });
                $(document)
                    .off("select2:open.select2LenisPrevent", ".customSelect, .select")
                    .on(
                        "select2:open.select2LenisPrevent",
                        ".customSelect, .select",
                        function () {
                            $(".select2-dropdown").attr("data-lenis-prevent", true);
                        }
                    );
            }
        });

        function initLenis() {
            scroller = new Lenis({
                duration: 1.2,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                orientation: "vertical",
                gestureOrientation: "vertical",
                smoothWheel: true,
                wheelMultiplier: 2,
                smoothTouch: true,
                touchMultiplier: 2,
                syncTouch: true,
                touchInertiaMultiplier: 35,
            });

            if (scroller) {
                scroller.stop();
            }
        }

        function raf(time) {
            if (scroller) {
                scroller.raf(time);
            }
            requestAnimationFrame(raf);
        }

        function preloadPage() {
            initLenis();
            requestAnimationFrame(raf);

            currentScrollY = $(window).scrollTop();
            if (scroller) {
                scroller.on("scroll", function (e) {
                    currentScrollY = $(window).scrollTop();
                });
            }
        }

        function initPage() {
            preloadPage();

            if (navigator.userAgent.indexOf("Windows") !== -1) {
                $("body").addClass("windows");
            } else if (navigator.userAgent.indexOf("Mac OS") !== -1) {
                $("body").addClass("macos");
            }

            $("html").removeClass("stopScroll fade");
            $("a[href*=\\#]").addClass("hashtagLink");

            if (scroller) {
                scroller.start();
            }

            $("html, body").removeClass("overflow");
            initPPEditorialOldItalic();
            lazyLoadImages();

            $(document).trigger("initPage");

            if (window.location.hash) {
                setTimeout(function () {
                    var hash = window.location.hash.split("#")[1];
                    var target = $("[data-anchor='" + hash + "']");
                    if (target.length) {
                        $('html, body').animate({
                            scrollTop: target.offset().top - ($("header .headerBar").height() * 2.5)
                        }, 500);
                    }
                }, 300);
            }

            $(".customSelect").each(function (i, el) {
                if ($(el).data("search")) {
                    $(el).select2({
                        placeholder: $(this).data("placeholder"),
                    });
                } else {
                    $(el).select2({
                        placeholder: $(this).data("placeholder"),
                        minimumResultsForSearch: -1,
                    });
                }
            });

            $(document)
                .off("select2:open.select2LenisPrevent", ".customSelect")
                .on("select2:open.select2LenisPrevent", ".customSelect", function () {
                    $(".select2-dropdown").attr("data-lenis-prevent", true);
                });

            $(document)
                .off("select2:open.multiselect2LenisPrevent", ".multiSelect")
                .on("select2:open.multiselect2LenisPrevent", ".multiSelect", function () {
                    $(".multiSelectContainer").attr("data-lenis-prevent", true);
                });
        }

        $(document).on("click", ".hashtagLink", function (e) {
            e.preventDefault();
            var hash = $(this).data("hash") || $(this).attr("href").split("#")[1];

            if (!hash) return;

            var target = $("[data-anchor='" + hash + "']");
            if (target.length) {
                var offset = target.offset().top - ($("header .headerBar").height() * 2.5);

                if (scroller) {
                    if (offset < 0) {
                        scroller.scrollTo(0, {
                            lerp: 0.1,
                            duration: 1,
                        });
                    } else {
                        scroller.scrollTo(target[0], {
                            offset: -($("header .headerBar").height() * 2.5),
                            lerp: 0.1,
                            duration: 1,
                        });
                    }
                } else {
                    $('html, body').animate({
                        scrollTop: offset
                    }, 500);
                }
            }
        });

        function lazyLoadImages() {
            var lazyloadImages;
            if ("IntersectionObserver" in window) {
                lazyloadImages = document.querySelectorAll(".lazy");
                const config = {
                    root: null,
                    rootMargin: '500px',
                    threshold: 0.0
                };
                var imageObserver = new IntersectionObserver(function (entries, observer) {
                    $(entries).each(function (i, entry) {
                        if (entry.isIntersecting) {
                            var image = entry.target;
                            image.classList.remove("lazy");

                            if (image.tagName === 'IMG' && image.dataset.src) {
                                image.src = image.dataset.src;
                            }

                            if (image.tagName === 'SOURCE' && image.dataset.srcset) {
                                image.srcset = image.dataset.srcset;
                            }

                            imageObserver.unobserve(image);
                        }
                    });
                }, config);
                $(lazyloadImages).each(function (i, image) {
                    imageObserver.observe(image);
                });
            } else {
                $(".lazy").each(function (i, image) {
                    image.classList.remove("lazy");

                    if (image.tagName === 'IMG' && image.dataset.src) {
                        image.src = image.dataset.src;
                    }

                    if (image.tagName === 'SOURCE' && image.dataset.srcset) {
                        image.srcset = image.dataset.srcset;
                    }
                });
            }
        }

        function initPPEditorialOldItalic() {
            $(".replaceFont, strong").each(function () {
                $(this).add($(this).find('*')).contents().filter(function () {
                    return this.nodeType === Node.TEXT_NODE && $.trim(this.nodeValue) !== '';
                }).each(function () {
                    const updatedText = this.nodeValue.replace(/([ao])/gi, '<span class="italic">$1</span>');
                    $(this).replaceWith($('<span>').html(updatedText).contents());
                });
            });
        }

        $(document).on("initHeader", function () {
            if (typeof initHeader === 'function') {
                initHeader();
            }
        });
    </script>
